<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Planet Voyage</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            border-radius: 12px;
            overflow: hidden;
            width: 900px;
            height: 650px;
            background: #000;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .hud-element {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 38px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            color: #a855f7;
        }

        p.subtitle {
            font-size: 15px;
            color: #a4b0be;
            margin-bottom: 25px;
        }

        .planet-select-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 820px;
            padding: 10px;
            z-index: 101;
        }

        .planet-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 10px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            color: #fff;
            outline: none;
        }

        .planet-card:hover {
            transform: translateY(-5px);
            border-color: #a855f7;
            box-shadow: 0 8px 18px rgba(168, 85, 247, 0.5);
            background: rgba(255, 255, 255, 0.18);
        }

        .planet-card:active {
            transform: translateY(-2px);
        }

        .planet-preview {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            box-shadow: inset -8px -8px 12px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .pyros-icon { background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff4757, #2f3542); }
        .glacies-icon { background: radial-gradient(circle at 30% 30%, #70a1ff, #1e90ff, #2ed573); }
        .toxicus-icon { background: radial-gradient(circle at 30% 30%, #7bed9f, #2ed573, #3742fa); }
        .aetheria-icon { background: radial-gradient(circle at 30% 30%, #eccc68, #ff7f50, #70a1ff); }
        .obscura-icon { background: radial-gradient(circle at 30% 30%, #a55eea, #4b7bec, #1e272e); }
        .solaria-icon { background: radial-gradient(circle at 30% 30%, #ffa502, #ff6348, #ffda79); }
        .chroma-icon { background: radial-gradient(circle at 30% 30%, #ff78ae, #a55eea, #26de81); }
        .aura-icon { background: radial-gradient(circle at 30% 30%, #00d2d3, #54a0ff, #5f27cd); }

        .planet-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            pointer-events: none;
        }

        .planet-desc {
            font-size: 11px;
            color: #ced6e0;
            line-height: 1.3;
            pointer-events: none;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 12px 28px;
