<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Planet Voyage</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            border-radius: 12px;
            overflow: hidden;
            width: 900px;
            height: 650px;
            background: #000;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .hud-element {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 38px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            color: #a855f7;
        }

        p.subtitle {
            font-size: 15px;
            color: #a4b0be;
            margin-bottom: 25px;
        }

        .planet-select-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 820px;
            padding: 10px;
            z-index: 101;
        }

        .planet-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 10px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            color: #fff;
            outline: none;
        }

        .planet-card:hover {
            transform: translateY(-5px);
            border-color: #a855f7;
            box-shadow: 0 8px 18px rgba(168, 85, 247, 0.5);
            background: rgba(255, 255, 255, 0.18);
        }

        .planet-card:active {
            transform: translateY(-2px);
        }

        .planet-preview {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            box-shadow: inset -8px -8px 12px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .pyros-icon { background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff4757, #2f3542); }
        .glacies-icon { background: radial-gradient(circle at 30% 30%, #70a1ff, #1e90ff, #2ed573); }
        .toxicus-icon { background: radial-gradient(circle at 30% 30%, #7bed9f, #2ed573, #3742fa); }
        .aetheria-icon { background: radial-gradient(circle at 30% 30%, #eccc68, #ff7f50, #70a1ff); }
        .obscura-icon { background: radial-gradient(circle at 30% 30%, #a55eea, #4b7bec, #1e272e); }
        .solaria-icon { background: radial-gradient(circle at 30% 30%, #ffa502, #ff6348, #ffda79); }
        .chroma-icon { background: radial-gradient(circle at 30% 30%, #ff78ae, #a55eea, #26de81); }
        .aura-icon { background: radial-gradient(circle at 30% 30%, #00d2d3, #54a0ff, #5f27cd); }

        .planet-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            pointer-events: none;
        }

        .planet-desc {
            font-size: 11px;
            color: #ced6e0;
            line-height: 1.3;
            pointer-events: none;
        }

        .btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #9333ea;
        }

        .restart-hint {
            font-size: 15px;
            color: #a4b0be;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui" class="hidden">
            <div class="hud-element" style="color: #2ed573;">Health: <span id="health">100</span></div>
            <div class="hud-element" style="color: #ffa502;">Distance: <span id="distance">0</span>/300m</div>
            <div class="hud-element" style="color: #70a1ff;">Score: <span id="score">0</span></div>
        </div>

        <div id="menu-screen" class="overlay">
            <h1>PLANET VOYAGE</h1>
            <p class="subtitle">Select a destination planet to launch your mission (Goal: Reach 300m)</p>

            <div class="planet-select-container">
                <button class="planet-card" data-planet="pyros">
                    <div class="planet-preview pyros-icon"></div>
                    <div class="planet-title" style="color: #ff4757;">Pyros</div>
                    <div class="planet-desc">Volcanic wasteland.<br><b>Fast & aggressive.</b></div>
                </button>

                <button class="planet-card" data-planet="glacies">
                    <div class="planet-preview glacies-icon"></div>
                    <div class="planet-title" style="color: #70a1ff;">Glacies</div>
                    <div class="planet-desc">Frozen tundra.<br><b>Armored aliens.</b></div>
                </button>

                <button class="planet-card" data-planet="toxicus">
                    <div class="planet-preview toxicus-icon"></div>
                    <div class="planet-title" style="color: #2ed573;">Toxicus</div>
                    <div class="planet-desc">Marshland.<br><b>Dense swarms.</b></div>
                </button>

                <button class="planet-card" data-planet="aetheria">
                    <div class="planet-preview aetheria-icon"></div>
                    <div class="planet-title" style="color: #eccc68;">Aetheria</div>
                    <div class="planet-desc">Gas Giant.<br><b>Unpredictable speed.</b></div>
                </button>

                <button class="planet-card" data-planet="obscura">
                    <div class="planet-preview obscura-icon"></div>
                    <div class="planet-title" style="color: #a55eea;">Obscura</div>
                    <div class="planet-desc">Shadow Realm.<br><b>Tough stealth beasts.</b></div>
                </button>

                <button class="planet-card" data-planet="solaria">
                    <div class="planet-preview solaria-icon"></div>
                    <div class="planet-title" style="color: #ffa502;">Solaria</div>
                    <div class="planet-desc">Solar Core.<br><b>Hyper fast swarms.</b></div>
                </button>

                <button class="planet-card" data-planet="chroma">
                    <div class="planet-preview chroma-icon"></div>
                    <div class="planet-title" style="color: #ff78ae;">Chroma</div>
                    <div class="planet-desc">Crystal Cavern.<br><b>Heavy tanks.</b></div>
                </button>

                <button class="planet-card" data-planet="aura">
                    <div class="planet-preview aura-icon"></div>
                    <div class="planet-title" style="color: #00d2d3;">Aura</div>
                    <div class="planet-desc">Nebula Anomaly.<br><b>Endless barrage.</b></div>
                </button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 style="color: #ff4757;">VOYAGE FAILED</h1>
            <p style="font-size: 18px; color: #dfe4ea; margin-bottom: 20px;">
                Score: <span id="final-score">0</span> | Distance: <span id="final-distance">0</span>m
            </p>
            <button id="restart-btn" class="btn">Change Destination</button>
            <p class="restart-hint" style="margin-top: 15px;">Or press SPACE to Retry Planet</p>
        </div>

        <div id="victory-screen" class="overlay hidden">
            <h1 style="color: #2ed573;">MISSION ACCOMPLISHED!</h1>
            <p style="font-size: 18px; color: #dfe4ea; margin-bottom: 20px;">
                You reached 300m! | Final Score: <span id="victory-score">0</span>
            </p>
            <button id="victory-btn" class="btn">Choose Next Planet</button>
            <p class="restart-hint" style="margin-top: 15px;">Or press SPACE to Play Again</p>
        </div>

        <canvas id="gameCanvas" width="900" height="650"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            const uiEl = document.getElementById('ui');
            const healthEl = document.getElementById('health');
            const distanceEl = document.getElementById('distance');
            const scoreEl = document.getElementById('score');
            const menuScreen = document.getElementById('menu-screen');
            const gameOverScreen = document.getElementById('game-over-screen');
            const victoryScreen = document.getElementById('victory-screen');
            const finalScoreEl = document.getElementById('final-score');
            const finalDistanceEl = document.getElementById('final-distance');
            const victoryScoreEl = document.getElementById('victory-score');
            const restartBtn = document.getElementById('restart-btn');
            const victoryBtn = document.getElementById('victory-btn');

            const TARGET_DISTANCE = 300;

            const PLANETS = {
                pyros: { name: 'Pyros', bgGradient: ['#2b0a0a', '#421414', '#5e1717'], terrainColor: '#1a0505', enemyColor: '#ff4757', speedMultiplier: 1.4, healthMultiplier: 1.0, spawnRateModifier: 1.0 },
                glacies: { name: 'Glacies', bgGradient: ['#0a1b2b', '#142c42', '#17405e'], terrainColor: '#050f1a', enemyColor: '#00d2d3', speedMultiplier: 0.9, healthMultiplier: 1.8, spawnRateModifier: 1.1 },
                toxicus: { name: 'Toxicus', bgGradient: ['#0a2b16', '#144223', '#175e2f'], terrainColor: '#051a0d', enemyColor: '#7bed9f', speedMultiplier: 1.1, healthMultiplier: 0.8, spawnRateModifier: 0.6 },
                aetheria: { name: 'Aetheria', bgGradient: ['#2b210a', '#423214', '#5e4817'], terrainColor: '#1a1305', enemyColor: '#eccc68', speedMultiplier: 1.6, healthMultiplier: 0.9, spawnRateModifier: 0.9 },
                obscura: { name: 'Obscura', bgGradient: ['#170a2b', '#261442', '#3a175e'], terrainColor: '#0d051a', enemyColor: '#a55eea', speedMultiplier: 1.0, healthMultiplier: 2.0, spawnRateModifier: 1.2 },
                solaria: { name: 'Solaria', bgGradient: ['#3b1805', '#572608', '#7c380d'], terrainColor: '#210d02', enemyColor: '#ffa502', speedMultiplier: 1.8, healthMultiplier: 0.7, spawnRateModifier: 0.5 },
                chroma: { name: 'Chroma', bgGradient: ['#2b0a23', '#421438', '#5e1751'], terrainColor: '#1a0515', enemyColor: '#ff78ae', speedMultiplier: 0.7, healthMultiplier: 2.5, spawnRateModifier: 1.3 },
                aura: { name: 'Aura', bgGradient: ['#05252b', '#0a3a42', '#0f525e'], terrainColor: '#021518', enemyColor: '#54a0ff', speedMultiplier: 1.2, healthMultiplier: 1.2, spawnRateModifier: 0.4 }
            };

            let selectedPlanet = PLANETS.pyros;
            let gameState = 'MENU';
            let score = 0;
            let distance = 0;
            let mouseX = canvas.width / 2;
            let mouseY = canvas.height / 2;
            let frameCount = 0;

            const player = { x: canvas.width / 2, y: canvas.height - 80, radius: 20, angle: 0, health: 100 };
            let projectiles = [];
            let enemies = [];
            let particles = [];
            let terrainPoints = [];

            // Card Listeners
            document.querySelectorAll('.planet-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const target = e.currentTarget;
                    const planetKey = target.getAttribute('data-planet');
                    if (PLANETS[planetKey]) {
                        selectedPlanet = PLANETS[planetKey];
                        startGame();
                    }
                });
            });

            restartBtn.addEventListener('click', showMenu);
            victoryBtn.addEventListener('click', showMenu);

            function showMenu() {
                gameState = 'MENU';
                menuScreen.classList.remove('hidden');
                gameOverScreen.classList.add('hidden');
                victoryScreen.classList.add('hidden');
                uiEl.classList.add('hidden');
            }

            function startGame() {
                score = 0;
                distance = 0;
                frameCount = 0;
                player.health = 100;
                player.x = canvas.width / 2;
                player.y = canvas.height - 80;
                projectiles = [];
                enemies = [];
                particles = [];
                
                gameState = 'PLAYING';
                menuScreen.classList.add('hidden');
                gameOverScreen.classList.add('hidden');
                victoryScreen.classList.add('hidden');
                uiEl.classList.remove('hidden');
                
                updateUI();
                initTerrain();
            }

            function initTerrain() {
                terrainPoints = [];
                for (let i = 0; i <= canvas.width + 50; i += 40) {
                    terrainPoints.push({ x: i, y: canvas.height - 40 - Math.random() * 30 });
                }
            }

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            });

            canvas.addEventListener('mousedown', () => {
                if (gameState !== 'PLAYING') return;

                const dx = mouseX - player.x;
                const dy = mouseY - player.y;
                const angle = Math.atan2(dy, dx);

                projectiles.push({
                    x: player.x + Math.cos(angle) * 25,
                    y: player.y + Math.sin(angle) * 25,
                    vx: Math.cos(angle) * 14,
                    vy: Math.sin(angle) * 14,
                    radius: 4
                });

                for (let i = 0; i < 3; i++) {
                    particles.push({
                        x: player.x + Math.cos(angle) * 20,
                        y: player.y + Math.sin(angle) * 20,
                        vx: (Math.random() - 0.5) * 2 + Math.cos(angle) * -2,
                        vy: (Math.random() - 0.5) * 2 + Math.sin(angle) * -2,
                        radius: Math.random() * 3 + 1,
                        color: '#ffffff',
                        life: 12
                    });
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && (gameState === 'GAMEOVER' || gameState === 'VICTORY')) {
                    startGame();
                }
            });

            function spawnEnemy() {
                const radius = Math.random() * 12 + 16;
                const x = Math.random() * (canvas.width - radius * 2) + radius;
                const y = -radius;
                const speed = (Math.random() * 1.2 + 1.2) * selectedPlanet.speedMultiplier;
                const health = Math.max(1, Math.floor((radius / 7) * selectedPlanet.healthMultiplier));

                enemies.push({
                    x: x, y: y, radius: radius, speed: speed, health: health, maxHealth: health, color: selectedPlanet.enemyColor, pulse: 0
                });
            }

            function createExplosion(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 1;
                    particles.push({
                        x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: Math.random() * 3 + 1, color: color, life: Math.random() * 20 + 10
                    });
                }
            }

            function update() {
                if (gameState !== 'PLAYING') return;

                frameCount++;
                distance = Math.floor(frameCount / 10);

                const dx = mouseX - player.x;
                const dy = mouseY - player.y;
                player.angle = Math.atan2(dy, dx);

                if (frameCount % 10 === 0) {
                    distanceEl.textContent = distance;
                }

                // Check for 300m Victory Condition
                if (distance >= TARGET_DISTANCE) {
                    triggerVictory();
                    return;
                }

                const baseRate = Math.max(16, 75 - Math.floor(distance / 40));
                const actualSpawnRate = Math.max(1, Math.floor(baseRate * selectedPlanet.spawnRateModifier));
                
                if (frameCount % actualSpawnRate === 0) {
                    spawnEnemy();
                }

                projectiles.forEach((p, index) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                        projectiles.splice(index, 1);
                    }
                });

                enemies.forEach((enemy, eIndex) => {
                    enemy.y += enemy.speed;
                    enemy.pulse += 0.05;

                    const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (distToPlayer < enemy.radius + player.radius) {
                        player.health -= 20;
                        createExplosion(enemy.x, enemy.y, enemy.color, 20);
                        enemies.splice(eIndex, 1);
                        updateUI();
                        if (player.health <= 0) triggerGameOver();
                        return;
                    }

                    if (enemy.y - enemy.radius > canvas.height) {
                        player.health -= 10;
                        enemies.splice(eIndex, 1);
                        updateUI();
                        if (player.health <= 0) triggerGameOver();
                        return;
                    }

                    projectiles.forEach((p, pIndex) => {
                        const distToProj = Math.hypot(enemy.x - p.x, enemy.y - p.y);
                        if (distToProj < enemy.radius + p.radius) {
                            enemy.health--;
                            createExplosion(p.x, p.y, '#ffffff', 4);
                            projectiles.splice(pIndex, 1);

                            if (enemy.health <= 0) {
                                createExplosion(enemy.x, enemy.y, enemy.color, 16);
                                score += Math.floor(enemy.radius * enemy.maxHealth);
                                enemies.splice(eIndex, 1);
                                updateUI();
                            }
                        }
                    });
                });

                particles.forEach((p, index) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if (p.life <= 0) particles.splice(index, 1);
                });

                terrainPoints.forEach(pt => {
                    pt.y += 0.2;
                    if (pt.y > canvas.height - 20) pt.y = canvas.height - 50;
                });
            }

            function draw() {
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, selectedPlanet.bgGradient[0]);
                gradient.addColorStop(0.5, selectedPlanet.bgGradient[1]);
                gradient.addColorStop(1, selectedPlanet.bgGradient[2]);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = selectedPlanet.terrainColor;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                terrainPoints.forEach(pt => ctx.lineTo(pt.x, pt.y));
                ctx.lineTo(canvas.width, canvas.height);
                ctx.fill();

                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#70a1ff';
                projectiles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                enemies.forEach(e => {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = e.color;

                    ctx.fillStyle = e.color;
                    ctx.beginPath();
                    const currentRadius = e.radius + Math.sin(e.pulse) * 2;
                    ctx.arc(0, 0, currentRadius, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(0, 0, currentRadius * 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(0, 0, currentRadius * 0.2, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                });

                if (gameState === 'PLAYING') {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.rotate(player.angle + Math.PI / 2);

                    ctx.fillStyle = '#2ed573';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#2ed573';

                    ctx.beginPath();
                    ctx.moveTo(0, -25);
                    ctx.lineTo(15, 15);
                    ctx.lineTo(0, 5);
                    ctx.lineTo(-15, 15);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(0, -2, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            function updateUI() {
                healthEl.textContent = Math.max(0, player.health);
                scoreEl.textContent = score;
            }

            function triggerGameOver() {
                gameState = 'GAMEOVER';
                finalScoreEl.textContent = score;
                finalDistanceEl.textContent = distance;
                gameOverScreen.classList.remove('hidden');
            }

            function triggerVictory() {
                gameState = 'VICTORY';
                victoryScoreEl.textContent = score;
                victoryScreen.classList.remove('hidden');
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            initTerrain();
            gameLoop();
        });
    </script>
</body>
</html>
