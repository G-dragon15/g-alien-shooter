<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Planet Voyage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            border-radius: 12px;
            overflow: hidden;
            width: 900px;
            height: 650px;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* HUD UI */
        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .hud-element {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Overlay Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 10, 26, 0.94);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 38px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            color: #a855f7;
        }

        p.subtitle {
            font-size: 15px;
            color: #a4b0be;
            margin-bottom: 25px;
        }

        /* Planet Selection Grid (2 rows of 4) */
        .planet-select-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 820px;
            padding: 10px;
        }

        .planet-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 10px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .planet-card:hover {
            transform: translateY(-5px);
            border-color: #a855f7;
            box-shadow: 0 8px 18px rgba(168, 85, 247, 0.35);
            background: rgba(255, 255, 255, 0.1);
        }

        .planet-card:active {
            transform: translateY(-2px);
        }

        .planet-preview {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            box-shadow: inset -8px -8px 12px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        /* Planet Styles */
        .pyros-icon { background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff4757, #2f3542); }
        .glacies-icon { background: radial-gradient(circle at 30% 30%, #70a1ff, #1e90ff, #2ed573); }
        .toxicus-icon { background: radial-gradient(circle at 30% 30%, #7bed9f, #2ed573, #3742fa); }
        .aetheria-icon { background: radial-gradient(circle at 30% 30%, #eccc68, #ff7f50, #70a1ff); }
        .obscura-icon { background: radial-gradient(circle at 30% 30%, #a55eea, #4b7bec, #1e272e); }
        .solaria-icon { background: radial-gradient(circle at 30% 30%, #ffa502, #ff6348, #ffda79); }
        .chroma-icon { background: radial-gradient(circle at 30% 30%, #ff78ae, #a55eea, #26de81); }
        .aura-icon { background: radial-gradient(circle at 30% 30%, #00d2d3, #54a0ff, #5f27cd); }

        .planet-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            pointer-events: none;
        }

        .planet-desc {
            font-size: 11px;
            color: #ced6e0;
            line-height: 1.3;
            pointer-events: none;
        }

        /* Buttons & Hints */
        .btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #9333ea;
        }

        .restart-hint {
            font-size: 15px;
            color: #a4b0be;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui" class="hidden">
            <div class="hud-element" style="color: #2ed573;">Health: <span id="health">100</span></div>
            <div class="hud-element" style="color: #ffa502;">Distance: <span id="distance">0</span>m</div>
            <div class="hud-element" style="color: #70a1ff;">Score: <span id="score">0</span></div>
        </div>

        <div id="menu-screen" class="overlay">
            <h1>PLANET VOYAGE</h1>
            <p class="subtitle">Select a destination planet to launch your mission</p>

            <div class="planet-select-container">
                <button class="planet-card" data-planet="pyros">
                    <div class="planet-preview pyros-icon"></div>
                    <div class="planet-title" style="color: #ff4757;">Pyros</div>
                    <div class="planet-desc">Volcanic wasteland.<br><b>Fast & aggressive.</b></div>
                </button>

                <button class="planet-card" data-planet="glacies">
                    <div class="planet-preview glacies-icon"></div>
                    <div class="planet-title" style="color: #70a1ff;">Glacies</div>
                    <div class="planet-desc">Frozen tundra.<br><b>Armored aliens.</b></div>
                </button>

                <button class="planet-card" data-planet="toxicus">
                    <div class="planet-preview toxicus-icon"></div>
                    <div class="planet-title" style="color: #2ed573;">Toxicus</div>
                    <div class="planet-desc">Marshland.<br><b>Dense swarms.</b></div>
                </button>

                <button class="planet-card" data-planet="aetheria">
                    <div class="planet-preview aetheria-icon"></div>
                    <div class="planet-title" style="color: #eccc68;">Aetheria</div>
                    <div class="planet-desc">Gas Giant.<br><b>Unpredictable speed.</b></div>
                </button>

                <button class="planet-card" data-planet="obscura">
                    <div class="planet-preview obscura-icon"></div>
                    <div class="planet-title" style="color: #a55eea;">Obscura</div>
                    <div class="planet-desc">Shadow Realm.<br><b>Tough stealth beasts.</b></div>
                </button>

                <button class="planet-card" data-planet="solaria">
                    <div class="planet-preview solaria-icon"></div>
                    <div class="planet-title" style="color: #ffa502;">Solaria</div>
                    <div class="planet-desc">Solar Core.<br><b>Hyper fast swarms.</b></div>
                </button>

                <button class="planet-card" data-planet="chroma">
                    <div class="planet-preview chroma-icon"></div>
                    <div class="planet-title" style="color: #ff78ae;">Chroma</div>
                    <div class="planet-desc">Crystal Cavern.<br><b>Heavy tanks.</b></div>
                </button>

                <button class="planet-card" data-planet="aura">
                    <div class="planet-preview aura-icon"></div>
                    <div class="planet-title" style="color: #00d2d3;">Aura</div>
                    <div class="planet-desc">Nebula Anomaly.<br><b>Endless barrage.</b></div>
                </button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 style="color: #ff4757;">VOYAGE FAILED</h1>
            <p style="font-size: 18px; color: #dfe4ea; margin-bottom: 20px;">
                Score: <span id="final-score">0</span> | Distance: <span id="final-distance">0</span>m
            </p>
            <button id="change-planet-btn" class="btn">Change Destination</button>
            <p class="restart-hint" style="margin-top: 15px;">Or press SPACE to Retry Planet</p>
        </div>

        <canvas id="gameCanvas" width="900" height="650"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const uiEl = document.getElementById('ui');
        const healthEl = document.getElementById('health');
        const distanceEl = document.getElementById('distance');
        const scoreEl = document.getElementById('score');
        const menuScreen = document.getElementById('menu-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const finalDistanceEl = document.getElementById('final-distance');
        const changePlanetBtn = document.getElementById('change-planet-btn');

        // 8 Planet Configurations
        const PLANETS = {
            pyros: {
                name: 'Pyros',
                bgGradient: ['#2b0a0a', '#421414', '#5e1717'],
                terrainColor: '#1a0505',
                enemyColor: '#ff4757',
                speedMultiplier: 1.4,
                healthMultiplier: 1.0,
                spawnRateModifier: 1.0
            },
            glacies: {
                name: 'Glacies',
                bgGradient: ['#0a1b2b', '#142c42', '#17405e'],
                terrainColor: '#050f1a',
                enemyColor: '#00d2d3',
                speedMultiplier: 0.9,
                healthMultiplier: 1.8,
                spawnRateModifier: 1.1
            },
            toxicus: {
                name: 'Toxicus',
                bgGradient: ['#0a2b16', '#144223', '#175e2f'],
                terrainColor: '#051a0d',
                enemyColor: '#7bed9f',
                speedMultiplier: 1.1,
                healthMultiplier: 0.8,
                spawnRateModifier: 0.6
            },
            aetheria: {
                name: 'Aetheria',
                bgGradient: ['#2b210a', '#423214', '#5e4817'],
                terrainColor: '#1a1305',
                enemyColor: '#eccc68',
                speedMultiplier: 1.6,
                healthMultiplier: 0.9,
                spawnRateModifier: 0.9
            },
            obscura: {
                name: 'Obscura',
                bgGradient: ['#170a2b', '#261442', '#3a175e'],
                terrainColor: '#0d051a',
                enemyColor: '#a55eea',
                speedMultiplier: 1.0,
                healthMultiplier: 2.0,
                spawnRateModifier: 1.2
            },
            solaria: {
                name: 'Solaria',
                bgGradient: ['#3b1805', '#572608', '#7c380d'],
                terrainColor: '#210d02',
                enemyColor: '#ffa502',
                speedMultiplier: 1.8,
                healthMultiplier: 0.7,
                spawnRateModifier: 0.5
            },
            chroma: {
                name: 'Chroma',
                bgGradient: ['#2b0a23', '#421438', '#5e1751'],
                terrainColor: '#1a0515',
                enemyColor: '#ff78ae',
                speedMultiplier: 0.7,
                healthMultiplier: 2.5,
                spawnRateModifier: 1.3
            },
            aura: {
                name: 'Aura',
                bgGradient: ['#05252b', '#0a3a42', '#0f525e'],
                terrainColor: '#021518',
                enemyColor: '#54a0ff',
                speedMultiplier: 1.2,
                healthMultiplier: 1.2,
                spawnRateModifier: 0.4
            }
        };

        let selectedPlanet = PLANETS.pyros;
        let gameState = 'MENU';
        let score = 0;
        let distance = 0;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let frameCount = 0;

        // Player Ship
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            radius: 20,
            angle: 0,
            health: 100
        };

        let projectiles = [];
        let enemies = [];
        let particles = [];
        let terrainPoints = [];

        function initTerrain() {
            terrainPoints = [];
            for
